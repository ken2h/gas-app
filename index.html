<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>GASアプリ表示</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .wrapper {
            position: fixed;
            top: -40px; /* Googleバーの高さ分だけ上にずらす */
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: calc(100vh + 40px); /* ずらした分だけ高さを足す */
            border: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbxyZUdN7H4_u1tTWGvza1mh2i2iKPaGzWZq7X7syZPU0TmZErPnNfy9sxRmsHL4Y_Ol/exec?embedded=true"></iframe>
    </div>
</body>
</html>

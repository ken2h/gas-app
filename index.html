<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務管理システム</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background: #f8f9fa; }
  #app-frame { width: 100%; height: 100vh; border: none; display: block; }
  #login { max-width: 360px; margin: 0 auto; padding: 80px 20px 0; }
  .card { background: #fff; padding: 32px 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
  .card h3 { margin: 0 0 8px; }
  .card p { color: #666; font-size: 14px; margin: 0 0 20px; }
  .msg { color: #d93025; font-size: 13px; min-height: 18px; margin-bottom: 12px; }
  .login-btn { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 6px; background: #1a73e8; color: #fff; cursor: pointer; }
  .login-btn:active { background: #1558b0; }
  #splash { max-width: 360px; margin: 0 auto; padding: 100px 20px 0; text-align: center; color: #666; font-size: 14px; }
</style>
</head>
<body>
<script>
  // ── 認証フロー ────────────────────────────────────────────────
  // ・初回 / セッション完全失効 … prompt=select_account でアカウント選択
  // ・トークンだけ失効（Googleログインは生きている）
  //     … prompt=none の全画面リダイレクトで「無操作」更新
  // ・iframe からの app-auth-expired、および失効2分前のタイマーで
  //   先回りしてサイレント更新する
  // ・タブ復帰時(visibilitychange)と30秒ポーリングでも判定し、
  //   バックグラウンド/スリープで setTimeout が止まっても取りこぼさない
  // ・直近 SILENT_COOLDOWN 内に戻ってきたら無限ループ回避で手動ログインへ
  var CLIENT_ID       = '1026254309160-3milkdp5ju4d7g935j3e4e9kes4j0fr3.apps.googleusercontent.com';
  var GAS_EXEC        = 'https://script.google.com/macros/s/AKfycbxyZUdN7H4_u1tTWGvza1mh2i2iKPaGzWZq7X7syZPU0TmZErPnNfy9sxRmsHL4Y_Ol/exec';
  var REDIRECT_URI    = 'https://ken2h.github.io/gas-app/';
  var TOKEN_KEY       = 'app_id_token';
  var NONCE_KEY       = 'app_login_nonce';  // sessionStorage: 認証リダイレクトのnonce
  var SILENT_AT_KEY   = 'app_silent_at';    // sessionStorage: 直近のサイレント更新時刻
  var SILENT_COOLDOWN = 60000;              // この時間内に戻ってきたらサイレント更新は断念

  // Google がサイレント認証を断ったときに返すエラー（＝ユーザー操作が必要）
  var INTERACTIVE_ERRORS = [
    'login_required', 'consent_required',
    'interaction_required', 'account_selection_required'
  ];

  var _refreshTimer = null; // 失効前の先回り更新タイマー

  function parseHash() {
    var h = location.hash.charAt(0) === '#' ? location.hash.slice(1) : location.hash;
    return new URLSearchParams(h);
  }

  function decodeJwtPayload(jwt) {
    var p = jwt.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    while (p.length % 4) p += '=';
    return JSON.parse(decodeURIComponent(escape(atob(p))));
  }

  function isExpired(jwt) {
    try {
      var exp = decodeJwtPayload(jwt).exp;
      return !exp || (Number(exp) * 1000 < Date.now() + 10000);
    } catch (e) { return true; }
  }

  function savedToken() {
    try { return localStorage.getItem(TOKEN_KEY); } catch (e) { return null; }
  }

  function savedEmail() {
    var t = savedToken();
    if (!t) return '';
    try { return decodeJwtPayload(t).email || ''; } catch (e) { return ''; }
  }

  function clearToken() {
    try { localStorage.removeItem(TOKEN_KEY); } catch (e) {}
  }

  function lastSilentAt() {
    try { return Number(sessionStorage.getItem(SILENT_AT_KEY)) || 0; } catch (e) { return 0; }
  }

  function silentOnCooldown() {
    return Date.now() - lastSilentAt() < SILENT_COOLDOWN;
  }

  function buildAuthUrl(nonce, prompt, loginHint) {
    var url = 'https://accounts.google.com/o/oauth2/v2/auth'
      + '?client_id=' + encodeURIComponent(CLIENT_ID)
      + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI)
      + '&response_type=id_token'
      + '&scope=' + encodeURIComponent('openid email profile')
      + '&nonce=' + encodeURIComponent(nonce)
      + '&prompt=' + encodeURIComponent(prompt);
    if (loginHint) url += '&login_hint=' + encodeURIComponent(loginHint);
    return url;
  }

  // トップ画面ごと Google 認証へ遷移する
  //   prompt='none'           … 画面を出さず更新（Googleログインが生きていれば即戻る）
  //   prompt='select_account' … アカウント選択画面を出す（手動ログイン）
  function redirectToAuth(prompt, loginHint) {
    var nonce = Date.now().toString(36) + Math.random().toString(36).slice(2);
    try { sessionStorage.setItem(NONCE_KEY, nonce); } catch (e) {}
    if (prompt === 'none') {
      try { sessionStorage.setItem(SILENT_AT_KEY, String(Date.now())); } catch (e) {}
    }
    location.href = buildAuthUrl(nonce, prompt, loginHint);
  }

  // 失効しているが Google ログインは生きていそうな場合のサイレント更新
  function trySilentRefresh() {
    if (silentOnCooldown()) {
      // 直前に試して戻ってきたばかり＝サイレントでは無理 → 手動ログインへ
      clearToken();
      showLogin('');
      return;
    }
    showSplash('セッションを更新しています…');
    redirectToAuth('none', savedEmail());
  }

  function showSplash(text) {
    if (_refreshTimer) { clearTimeout(_refreshTimer); _refreshTimer = null; }
    document.body.innerHTML = '<div id="splash">' + (text || '読み込んでいます…') + '</div>';
  }

  function showApp(token) {
    if (_refreshTimer) { clearTimeout(_refreshTimer); _refreshTimer = null; }
    document.body.innerHTML = '';
    var f = document.createElement('iframe');
    f.id = 'app-frame';
    f.src = GAS_EXEC + '?token=' + encodeURIComponent(token);
    document.body.appendChild(f);

    // 失効2分前に先回りでサイレント更新（iframe のオーバーレイが出る前に処理する）
    try {
      var exp = Number(decodeJwtPayload(token).exp) * 1000;
      var fireIn = exp - Date.now() - 2 * 60 * 1000;
      if (fireIn < 0) fireIn = 0;
      if (fireIn <= 2147483647) {
        _refreshTimer = setTimeout(trySilentRefresh, fireIn);
      }
    } catch (e) {}
  }

  function showLogin(message) {
    if (_refreshTimer) { clearTimeout(_refreshTimer); _refreshTimer = null; }
    document.body.innerHTML =
      '<div id="login"><div class="card">' +
        '<h3>業務管理システム</h3>' +
        '<p>Googleアカウントでログインしてください</p>' +
        '<div class="msg"></div>' +
        '<button type="button" class="login-btn">Googleでログイン</button>' +
      '</div></div>';
    document.querySelector('.msg').textContent = message || '';
    document.querySelector('.login-btn').addEventListener('click', function () {
      redirectToAuth('select_account', null);
    });
  }

  // GASアプリ(iframe)からのメッセージ
  window.addEventListener('message', function (ev) {
    if (!ev.data || typeof ev.data !== 'object') return;

    if (ev.data.type === 'app-logout') {
      clearToken();
      showLogin('');
      return;
    }

    if (ev.data.type === 'app-auth-expired') {
      // 先回りタイマーが間に合わなかった場合の保険。サイレント更新を試みる。
      trySilentRefresh();
    }
  });

  // タブをバックグラウンドにしたりPCがスリープすると setTimeout は止まる。
  // タブ復帰時と30秒ポーリングでもトークンの残り時間を見て先回り更新する。
  // trySilentRefresh 側に SILENT_COOLDOWN(60秒)の連投ガードがあるため、
  // 短時間に何度呼ばれても安全。
  function checkSessionFreshness() {
    var token = savedToken();
    if (!token) return;
    try {
      var exp = decodeJwtPayload(token).exp;
      if (!exp) return;
      var remain = Number(exp) * 1000 - Date.now();
      if (remain < 2 * 60 * 1000) {
        trySilentRefresh();
      }
    } catch (e) {}
  }

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') checkSessionFreshness();
  });
  setInterval(checkSessionFreshness, 30 * 1000);

  (function init() {
    var params  = parseHash();
    var idToken = params.get('id_token');
    var err     = params.get('error');

    // ── Google認証から戻ってきた：トークンあり ──────────────────
    if (idToken) {
      history.replaceState(null, '', REDIRECT_URI); // URLからトークンを除去
      var savedNonce = null;
      try { savedNonce = sessionStorage.getItem(NONCE_KEY); sessionStorage.removeItem(NONCE_KEY); } catch (e) {}
      var ok = false;
      try {
        var payload = decodeJwtPayload(idToken);
        ok = !!savedNonce && payload.nonce === savedNonce
             && payload.aud === CLIENT_ID && !isExpired(idToken);
      } catch (e) { ok = false; }

      if (ok) {
        try { localStorage.setItem(TOKEN_KEY, idToken); } catch (e) {}
        showApp(idToken);
      } else {
        clearToken();
        showLogin('ログイン情報の検証に失敗しました。もう一度お試しください。');
      }
      return;
    }

    // ── Google認証から戻ってきた：エラーあり ────────────────────
    if (err) {
      history.replaceState(null, '', REDIRECT_URI);
      try { sessionStorage.removeItem(NONCE_KEY); } catch (e) {}
      if (INTERACTIVE_ERRORS.indexOf(err) !== -1) {
        // サイレント更新できなかった＝本当にログインが必要。通常のログイン画面へ。
        showLogin('');
      } else {
        showLogin('ログインできませんでした。もう一度お試しください。');
      }
      return;
    }

    // ── 通常起動：保存済みトークンの状態で分岐 ──────────────────
    var saved = savedToken();
    if (saved && !isExpired(saved)) {
      showApp(saved);
      return;
    }
    if (saved) {
      // 失効しているが、Googleログインが生きていれば無操作で更新できる
      trySilentRefresh();
      return;
    }
    // トークンなし → 手動ログイン
    showLogin('');
  })();
</script>
</body>
</html>

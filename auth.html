<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>ログイン</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; padding: 40px 20px; text-align: center; background: #f8f9fa; }
    .container { max-width: 360px; margin: 0 auto; background: white; padding: 32px 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h3 { margin: 0 0 16px; }
    p { color: #666; font-size: 14px; margin: 0 0 24px; }
    .signin-wrap { display: flex; justify-content: center; }
  </style>
</head>
<body>
  <div class="container">
    <h3>ログイン</h3>
    <p>Googleアカウントでログインしてください</p>

    <div id="g_id_onload"
         data-client_id="1026254309160-3milkdp5ju4d7g935j3e4e9kes4j0fr3.apps.googleusercontent.com"
         data-callback="onCredential"
         data-ux_mode="popup"
         data-context="signin"
         data-use_fedcm_for_prompt="true"
         data-auto_prompt="false">
    </div>
    <div class="signin-wrap">
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="outline"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left">
      </div>
    </div>
  </div>

  <script>
    function onCredential(response) {
      if (response && response.credential && window.opener) {
        window.opener.postMessage({
          type: 'gsi-credential',
          idToken: response.credential
        }, '*');
      }
      window.close();
    }
  </script>
</body>
</html>
